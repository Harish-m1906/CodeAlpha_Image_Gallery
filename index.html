<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>✨📸 Image Gallery </h1>

  <div class="filters">
    <button class="active" onclick="filterImages('all', this)">All</button>
    <button onclick="filterImages('nature', this)">Nature</button>
    <button onclick="filterImages('tech', this)">Tech</button>
    <button onclick="filterImages('animals', this)">Animals</button>
    <button onclick="filterImages('city', this)">City</button>
  </div>
</header>

<section class="gallery">

  <!-- 🌿 NATURE -->
  <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=900" class="img nature">
  <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=900" class="img nature">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=900" class="img nature">
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900" class="img nature">
  <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=900" class="img nature">

  <!-- 💻 TECH -->
  <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=900" class="img tech">
  <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=900" class="img tech">
  <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=900" class="img tech">
  <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=900" class="img tech">

  <!-- 🐾 ANIMALS -->
  <img src="https://images.unsplash.com/photo-1456926631375-92c8ce872def?w=900" class="img animals">
  <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=900" class="img animals">
  <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=900" class="img animals">
  <img src="https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=900" class="img animals">
  <img src="https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?w=900" class="img animals">

  <!-- 🏙️ CITY -->
  <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=900" class="img city">
  <img src="https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=900" class="img city">
  <img src="https://images.unsplash.com/photo-1491884662610-dfcd28f30cfb?w=900" class="img city">
  <img src="https://images.unsplash.com/photo-1522083165195-3424ed129620?w=900" class="img city">

</section>

<!-- LIGHTBOX -->
<div class="modal" id="modal">
  <span class="close">&times;</span>
  <img class="modal-img" id="modalImg">

  <div class="controls">
    <button id="prev">❮ Prev</button>
    <button id="next">Next ❯</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
